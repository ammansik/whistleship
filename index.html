<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Whistle Jump Game</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #111;
      color: white;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: grid;
      place-items: center;
    }

    .wrap {
      display: grid;
      gap: 12px;
      justify-items: center;
    }

    canvas {
      background: #000;
      border: 2px solid #333;
      image-rendering: crisp-edges;
    }

    .hud {
      width: 800px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: #ddd;
    }

    button {
      cursor: pointer;
      border: 0;
      border-radius: 10px;
      padding: 8px 14px;
      background: #f5d742;
      color: #111;
      font-weight: 700;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .hint {
      max-width: 800px;
      font-size: 13px;
      color: #aaa;
      text-align: center;
      line-height: 1.45;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hud">
      <div id="status">Requesting microphone access…</div>
      <button id="micButton">Start microphone</button>
    </div>

    <canvas id="game" width="800" height="620"></canvas>

    <div class="hint">
      Whistle or press <strong>Space/Arrow Up</strong> to jump over incoming obstacles.
      Press <strong>R</strong> after a crash to restart.
    </div>
  </div>

  <script>
    "use strict";

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const statusEl = document.getElementById("status");
    const micButton = document.getElementById("micButton");

    const WIDTH = canvas.width;
    const HEIGHT = canvas.height;
    const GROUND_HEIGHT = 110;
    const GRAVITY = 1750;

    class Obstacle {
      constructor(startX) {
        this.width = randomInt(18, 30);
        this.height = randomInt(40, 78);
        this.speed = 255;
        this.reset(startX);
      }

      move(dt) {
        this.x -= this.speed * dt;
      }

      reset(newX) {
        this.x = newX;
        this.width = randomInt(18, 30);
        this.height = randomInt(40, 78);
      }

      draw(ctx) {
        const y = HEIGHT - GROUND_HEIGHT - this.height;

        ctx.fillStyle = "#facc15";
        ctx.fillRect(this.x, y, this.width, this.height);

        ctx.fillStyle = "#fef08a";
        ctx.fillRect(this.x + 6, y + 8, this.width - 12, 10);
      }

      bounds() {
        return {
          x: this.x,
          y: HEIGHT - GROUND_HEIGHT - this.height,
          w: this.width,
          h: this.height,
        };
      }
    }

    class Runner {
      constructor() {
        this.width = 44;
        this.height = 48;
        this.x = 130;
        this.y = HEIGHT - GROUND_HEIGHT - this.height;
        this.vy = 0;
        this.jumpVelocity = -680;
      }

      jump() {
        if (this.onGround()) {
          this.vy = this.jumpVelocity;
        }
      }

      onGround() {
        return this.y >= HEIGHT - GROUND_HEIGHT - this.height - 0.5;
      }

      update(dt) {
        this.vy += GRAVITY * dt;
        this.y += this.vy * dt;

        const groundY = HEIGHT - GROUND_HEIGHT - this.height;
        if (this.y > groundY) {
          this.y = groundY;
          this.vy = 0;
        }
      }

      draw(ctx) {
        const centerX = this.x + this.width / 2;
        const centerY = this.y + this.height / 2;

        ctx.save();
        ctx.translate(centerX, centerY);

        // Body
        ctx.fillStyle = "#7dd3fc";
        ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);

        // Face visor
        ctx.fillStyle = "#e0f2fe";
        ctx.fillRect(4, -13, 13, 12);

        // Legs
        ctx.fillStyle = "#f97316";
        ctx.fillRect(-14, this.height / 2 - 8, 10, 8);
        ctx.fillRect(4, this.height / 2 - 8, 10, 8);

        ctx.restore();
      }

      bounds() {
        return {
          x: this.x + 4,
          y: this.y + 3,
          w: this.width - 8,
          h: this.height - 3,
        };
      }
    }

    function rectsOverlap(a, b) {
      return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
      );
    }

    function randomInt(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    let player;
    let obstacles;
    let crashed;
    let score;
    let lastTime;
    let animationId;

    function resetGame() {
      player = new Runner();
      obstacles = [
        new Obstacle(860),
        new Obstacle(1190),
        new Obstacle(1520),
      ];
      crashed = false;
      score = 0;
      whistleAmplitude = 0;
      lastTime = performance.now();
      cancelAnimationFrame(animationId);
      animationId = requestAnimationFrame(loop);
    }

    function triggerJump() {
      if (!crashed) {
        player.jump();
      }
    }

    function loop(now) {
      const dt = Math.min((now - lastTime) / 1000, 0.033);
      lastTime = now;

      if (!crashed) {
        player.update(dt);

        const farthestX = Math.max(...obstacles.map((obstacle) => obstacle.x));
        for (const obstacle of obstacles) {
          obstacle.move(dt);

          if (obstacle.x + obstacle.width < 0) {
            obstacle.reset(farthestX + randomInt(250, 360));
            score += 1;
          }

          if (rectsOverlap(player.bounds(), obstacle.bounds())) {
            crashed = true;
            statusEl.textContent = "Crashed! Press R to restart.";
          }
        }
      }

      draw();
      animationId = requestAnimationFrame(loop);
    }

    function drawGround() {
      const y = HEIGHT - GROUND_HEIGHT;
      ctx.fillStyle = "#1f2937";
      ctx.fillRect(0, y, WIDTH, GROUND_HEIGHT);

      ctx.strokeStyle = "#60a5fa";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(0, y + 1);
      ctx.lineTo(WIDTH, y + 1);
      ctx.stroke();
    }

    function draw() {
      ctx.clearRect(0, 0, WIDTH, HEIGHT);
      ctx.fillStyle = "#000";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      drawGround();

      for (const obstacle of obstacles) {
        obstacle.draw(ctx);
      }

      player.draw(ctx);

      ctx.fillStyle = "white";
      ctx.font = "18px system-ui, sans-serif";
      ctx.fillText(`Score: ${score}`, 16, 28);
      drawWhistleMeter();

      if (crashed) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.62)";
        ctx.fillRect(0, 0, WIDTH, HEIGHT);
        ctx.fillStyle = "white";
        ctx.font = "700 44px system-ui, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", WIDTH / 2, HEIGHT / 2 - 20);
        ctx.font = "20px system-ui, sans-serif";
        ctx.fillText("Press R to restart", WIDTH / 2, HEIGHT / 2 + 22);
        ctx.textAlign = "left";
      }
    }

    function drawWhistleMeter() {
      const meterWidth = 18;
      const meterHeight = 220;
      const meterX = WIDTH - meterWidth - 20;
      const meterY = 24;
      const fillHeight = meterHeight * whistleAmplitude;

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(meterX, meterY, meterWidth, meterHeight);
      ctx.strokeStyle = "#334155";
      ctx.lineWidth = 2;
      ctx.strokeRect(meterX, meterY, meterWidth, meterHeight);

      const gradient = ctx.createLinearGradient(0, meterY + meterHeight, 0, meterY);
      gradient.addColorStop(0, "#22d3ee");
      gradient.addColorStop(0.5, "#facc15");
      gradient.addColorStop(1, "#ef4444");
      ctx.fillStyle = gradient;
      ctx.fillRect(meterX, meterY + meterHeight - fillHeight, meterWidth, fillHeight);

      ctx.save();
      ctx.translate(meterX + meterWidth + 16, meterY + meterHeight / 2);
      ctx.rotate(-Math.PI / 2);
      ctx.fillStyle = "#cbd5e1";
      ctx.font = "12px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("WHISTLE", 0, 0);
      ctx.restore();
    }

    window.addEventListener("keydown", (event) => {
      if (event.code === "ArrowUp" || event.code === "Space") {
        triggerJump();
        event.preventDefault();
      } else if (event.code === "KeyR") {
        resetGame();
        statusEl.textContent = audioEnabled
          ? "Microphone enabled. Whistle to jump."
          : "Click “Start microphone” to enable whistle control.";
      }
    });

    // Browser microphone whistle detector.
    let audioContext = null;
    let analyser = null;
    let micSource = null;
    let audioEnabled = false;
    let whistleFrames = 0;
    let silenceFrames = 0;
    let whistleLatched = false;
    let lastJumpAt = 0;
    let whistleAmplitude = 0;
    let rollingNoiseMedian = 1;
    let rollingNoiseMax = 30;
    let rollingNoiseMean = 4;
    let lastPeakHz = 0;

    async function startMicrophone(isAutoPrompt = false) {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        audioContext = new AudioContext();
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        analyser.smoothingTimeConstant = 0.25;

        micSource = audioContext.createMediaStreamSource(stream);
        micSource.connect(analyser);

        audioEnabled = true;
        micButton.disabled = true;
        micButton.textContent = "Microphone enabled";
        statusEl.textContent = "Microphone enabled. Whistle to jump.";
        detectWhistle();
      } catch (error) {
        statusEl.textContent = isAutoPrompt
          ? "Microphone permission is required. Click “Start microphone” to allow it."
          : "Could not access microphone. Please allow mic access and try again.";
        console.error(error);
      }
    }

    function detectWhistle() {
      if (!analyser || crashed) {
        requestAnimationFrame(detectWhistle);
        return;
      }

      const bins = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(bins);

      const sampleRate = audioContext.sampleRate;
      const hzPerBin = sampleRate / analyser.fftSize;

      const startBin = Math.max(1, Math.floor(1800 / hzPerBin));
      const endBin = Math.min(bins.length - 1, Math.floor(5000 / hzPerBin));

      const lowBandStart = Math.max(1, Math.floor(200 / hzPerBin));
      const lowBandEnd = Math.max(lowBandStart, Math.floor(1500 / hzPerBin));

      let maxValue = 0;
      let peakBin = startBin;
      let sum = 0;
      let geoLogSum = 0;
      let lowBandSum = 0;
      const values = [];

      for (let i = startBin; i <= endBin; i++) {
        const value = bins[i];
        values.push(value);
        sum += value;
        geoLogSum += Math.log(Math.max(value, 1));
        if (value > maxValue) {
          maxValue = value;
          peakBin = i;
        }
      }

      for (let i = lowBandStart; i <= lowBandEnd; i++) {
        lowBandSum += bins[i];
      }

      values.sort((a, b) => a - b);
      const median = values[Math.floor(values.length / 2)] || 1;
      const mean = sum / Math.max(values.length, 1);
      const peakHz = peakBin * hzPerBin;
      const geometricMean = Math.exp(geoLogSum / Math.max(values.length, 1));
      const spectralFlatness = geometricMean / Math.max(mean, 1);
      const whistleBandRatio = sum / Math.max(lowBandSum, 1);

      rollingNoiseMedian = rollingNoiseMedian * 0.97 + median * 0.03;
      rollingNoiseMax = rollingNoiseMax * 0.97 + maxValue * 0.03;
      rollingNoiseMean = rollingNoiseMean * 0.97 + mean * 0.03;

      const peakRatio = maxValue / Math.max(median, 1);
      const dynamicAmpThreshold = Math.max(75, rollingNoiseMax * 1.7);
      const dynamicMeanThreshold = Math.max(7, rollingNoiseMean * 1.5);
      const dynamicRatioThreshold = Math.max(3.6, rollingNoiseMedian > 0 ? 4.0 : 3.6);
      const dynamicBandRatio = Math.max(2.0, rollingNoiseMean > 10 ? 2.6 : 2.2);
      const peakStable = lastPeakHz === 0 || Math.abs(peakHz - lastPeakHz) < 260;
      const whistlePitch = peakHz >= 2200 && peakHz <= 4200;
      const tonalEnough = spectralFlatness < 0.66;
      const bandDominant = whistleBandRatio > dynamicBandRatio;
      const loudEnough = maxValue > dynamicAmpThreshold && mean > dynamicMeanThreshold;
      const whistleNow =
        loudEnough &&
        peakRatio > dynamicRatioThreshold &&
        whistlePitch &&
        peakStable &&
        tonalEnough &&
        bandDominant;
      const normalizedAmplitude = Math.min(1, maxValue / 255);
      whistleAmplitude = whistleAmplitude * 0.8 + normalizedAmplitude * 0.2;
      lastPeakHz = peakHz;

      if (whistleNow) {
        whistleFrames += 1;
        silenceFrames = 0;
      } else {
        silenceFrames += 1;
        whistleFrames = 0;
      }

      if (silenceFrames >= 5 || maxValue < dynamicAmpThreshold * 0.55) {
        whistleLatched = false;
      }

      const now = performance.now();
      const hasStableWhistle = whistleFrames >= 3;
      if (!whistleLatched && hasStableWhistle && now - lastJumpAt > 220) {
        triggerJump();
        whistleLatched = true;
        lastJumpAt = now;
      }

      requestAnimationFrame(detectWhistle);
    }

    micButton.addEventListener("click", startMicrophone);

    resetGame();
    startMicrophone(true);
  </script>
</body>
</html>
